networks:
  easy-zsv:
    driver: bridge

services:

  init:
    image: easyzsv/init:latest
    profiles:
      - init
    depends_on:
      - database
      - backend
      - wireguard-zsv-service
      - amneziawg-zsv-service
    build:
      context: init/
      dockerfile: Dockerfile
    environment:
      - API=http://backend:80
      - DB_CONNECTION_STRING=postgresql://${DB_USER}@database:5432
      - DB_PASSWORD=${DB_PASSWORD}
      - CREATE_SECURITY_KEEPER=${INIT_SECURITY_KEEPER:-NO}
      - CREATE_DYNAMIC_PAGES=${INIT_DYNAMIC_PAGES:-NO}
    restart: no
    networks:
      - easy-zsv

# ╔═══ REGION: Base infractructure services ═══╗
  database:
    image: postgres:16
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432"
    restart: always
    volumes:
      - ${DB_VOLUME}:/var/lib/postgresql/data
    networks:
      - easy-zsv

  backend:
    image: easyzsv/backend:latest
    depends_on:
      - database
    ports:
      - "80"
    build:
      context: backend/
      dockerfile: Dockerfile
    environment:
      - HashSettings__Secret=${BACK_HASH_SECRET}
      - JwtSettings__Secret=${BACK_AUTH_SECRET}
      - JwtSettings__ExpiryMinutes=${BACK_AUTH_EXPIRE}
      - ExpireSettings__CheckMinutes=${BACK_TASK_EXPIRE}
      - Features__UseDocumentationEndpoint=${BACK_DOCS_ENABLED:-true}
      - ConnectionStrings__Postgres=User ID=${DB_USER};Password=${DB_PASSWORD};Host=database;Port=5432;
      - ASPNETCORE_URLS=http://+:80
    restart: always
    networks:
      - easy-zsv

  frontend:
    image: easyzsv/frontend:latest
    depends_on:
      - backend
    ports:
      - "3000"
    build:
      context: frontend/
      dockerfile: Dockerfile
    environment:
      - API_URL=/api/
      - AUTH_CHECK_MINUTES=${FRONT_CHECK_AUTH}
    restart: always
    networks:
      - easy-zsv

  reverse-proxy:
    image: nginx:mainline
    depends_on:
      - backend
      - frontend
    ports:
      - "${PORT}:80"
    command: >
      /bin/sh -c "
        echo 'worker_processes 4;

        events {
          worker_connections 1024;
        }

        http {
          
          server {
            listen 80;

            location / {
                proxy_pass http://frontend:3000;
            }

            location /api/ {
                rewrite ^/api/(.*)$ /$1 break;
                proxy_pass http://backend:80;
            }
          }
        }
        ' > /etc/nginx/nginx.conf && nginx -g 'daemon off;'
      "
    restart: always
    networks:
      - easy-zsv
# ╚═══ REGION: Base infractructure services ═══╝



# ╔═══ REGION: ZSV services ═══╗
  wireguard-zsv-service:
    image: easyzsv/wireguard-zsv:latest
    build:
      context: services/WireguardZsv
      dockerfile: Dockerfile
    environment:
      - SERVICE_HOST=${ZSV_IP}  # your host address
      - SERVICE_USER=${ZSV_USER}            # your user name for auth
      - SERVICE_PASSWORD=${ZSV_PASSWORD}      # your password for auth
      - ZSV_PORT=${WG_ZSV_PORT}
      - API_PORT=${WG_API_PORT}
    ports:
      - "${WG_ZSV_PORT}:${WG_ZSV_PORT}/udp"  # wireguard port
      - "${WG_API_PORT}:${WG_API_PORT}/tcp"    # http-api port
    volumes:
      - ${WG_VOLUME}:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: always

  amneziawg-zsv-service:
    image: easyzsv/amneziawg-zsv:latest
    build:
      context: services/AmneziaWgZsv
      dockerfile: Dockerfile
    environment:
      - SERVICE_HOST=${ZSV_IP}  # your host address
      - SERVICE_USER=${ZSV_USER}            # your user name for auth
      - SERVICE_PASSWORD=${ZSV_PASSWORD}      # your password for auth
      - ZSV_PORT=${AWG_ZSV_PORT}
      - API_PORT=${AWG_API_PORT}
    ports:
      - "${AWG_ZSV_PORT}:${AWG_ZSV_PORT}/udp"  # amnezia wg port
      - "${AWG_API_PORT}:${AWG_API_PORT}/tcp"    # http-api port
    volumes:
      - ${AWG_VOLUME}:/etc/amnezia
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    devices:
      - "/dev/net/tun:/dev/net/tun"  # device mapping for TUN interface
    restart: always
# ╚═══ REGION: ZSV services ═══╝


